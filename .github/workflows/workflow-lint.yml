name: Lint GitHub Actions workflow files

on:
    push:
        branches:
            - main
        paths:
            # Only run when changes are made to workflow files or the actionlint config/composite actions.
            - '.github/workflows/**'
            - '.github/actions/**'
            - '.github/actionlint.yml'
    pull_request:
        branches:
            - main
        paths:
            # Only run when changes are made to workflow files or the actionlint config/composite actions.
            - '.github/workflows/**'
            - '.github/actions/**'
            - '.github/actionlint.yml'
    workflow_dispatch:

# Cancels all previous workflow runs for pull requests that have not completed.
concurrency:
    # The concurrency group contains the workflow name and the branch name for pull requests
    # or the commit hash for any other events.
    group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
    cancel-in-progress: true

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:
    # Runs the actionlint GitHub Action workflow file linter.
    #
    # This helps guard against common mistakes including strong type checking for expressions (${{ }}), security checks,
    # `run:` script checking, glob syntax validation, and more.
    #
    # Performs the following steps:
    # - Checks out the repository.
    # - Runs actionlint.
    actionlint:
        name: Run actionlint
        runs-on: ubuntu-24.04
        permissions:
            contents: read
        timeout-minutes: 5

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
                  show-progress: ${{ runner.debug == '1' && 'true' || 'false' }}

            # actionlint is static checker for GitHub Actions workflow files.
            # See https://github.com/rhysd/actionlint.
            # Configuration file: .github/actionlint.yml
            - name: Run actionlint
              uses: docker://rhysd/actionlint:1.7.11
              with:
                  args: '-color -verbose'
